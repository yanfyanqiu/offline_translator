name: offline_translator
description: "离线翻译 APP - Flutter + llma.cpp + GGUF"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # 本地存储
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 音频
  record: ^5.1.2
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # HTTP / 下载
  http: ^1.2.2

  # Camera / OCR
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.13.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.8
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.1.2

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/icons/
